<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevForge - Foundation Components</title>
    <style>
      :root {
        --bg: #1a1a1a;
        --panel: #2d2d2d;
        --text: #e0e0e0;
        --text-secondary: #a0a0a0;
        --border: #404040;
        --accent: #3b82f6;
        --accent-dim: rgba(59, 130, 246, 0.1);
        --green: #10b981;
        --red: #ef4444;
        --yellow: #f59e0b;
        --input-bg: #252525;
      }

      html[data-theme='light'] {
        --bg: #ffffff;
        --panel: #f3f4f6;
        --text: #1f2937;
        --text-secondary: #6b7280;
        --border: #d1d5db;
        --accent: #2563eb;
        --accent-dim: rgba(37, 99, 235, 0.1);
        --green: #059669;
        --red: #dc2626;
        --yellow: #d97706;
        --input-bg: #f9fafb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        background-color: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 30px;
        font-size: 32px;
      }

      h2 {
        margin-top: 40px;
        margin-bottom: 20px;
        font-size: 24px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 10px;
      }

      .component-section {
        margin-bottom: 40px;
        padding: 20px;
        background-color: var(--panel);
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
      }

      .component-demo {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        padding: 20px;
        background-color: var(--bg);
        border-radius: 6px;
        border: 1px solid var(--border);
        min-height: 60px;
      }

      .demo-group {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .label {
        font-size: 12px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-right: 10px;
      }

      #toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 400px;
        z-index: 9999;
      }

      .footer {
        margin-top: 60px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        color: var(--text-secondary);
        font-size: 14px;
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; height: 100vh; overflow: hidden;">
    <div id="app"></div>

    <script type="module">
      import { AppLayout, ChatWindow, Sidebar, InputBox } from './index.ts';

      // Initialize the full DevForge app with sidebar and chat
      const appContainer = document.getElementById('app');
      if (appContainer) {
        const layout = AppLayout.create({ showSidebar: true });
        appContainer.appendChild(layout);

        // Add Sidebar to sidebar section
        const sidebarSection = layout.querySelector('.sidebar-section');
        if (sidebarSection) {
          const sidebar = Sidebar.create();
          sidebarSection.appendChild(sidebar);
        }

        // Add a ChatWindow with InputBox to the main content area
        const mainSection = layout.querySelector('.main-section');
        if (mainSection) {
          // Clear any existing content
          mainSection.innerHTML = '';

          // Create a container for chat components
          const chatContainer = document.createElement('div');
          chatContainer.style.cssText = `
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 12px;
            padding: 16px;
            overflow: hidden;
          `;

          // Add ChatWindow and InputBox
          const chatWindow = ChatWindow.create();
          const inputBox = InputBox.create({
            placeholder: 'Type your message...',
            disabled: false,
            onSend: (message) => {
              console.log('Message sent:', message);
              // TODO: Connect to API
            },
          });

          chatContainer.appendChild(chatWindow);
          chatContainer.appendChild(inputBox);
          mainSection.appendChild(chatContainer);
        }
      }
    </script>
  </body>
</html>
