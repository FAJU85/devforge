<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚡ DevForge — AI Coding Agent</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-white dark:bg-[#0D1116] text-[#0D1116] dark:text-white">
    <div id="app"></div>

    <script type="module">
      import './styles.css';
      import {
        AppLayout, ChatWindow, Sidebar, InputBox,
        SettingsForm, ModelSelector, ProviderSelector,
        MainPanel, CommandPalette, RepositoryService,
        RepoSelector, RepoTree, SearchBox
      } from './index.ts';

      // Wait for DOM to be ready
      async function initializeApp() {
        const appContainer = document.getElementById('app');
        if (!appContainer) {
          console.error('App container not found');
          return;
        }

        // Create main layout with proper structure
        const appLayout = AppLayout.create({ showSidebar: true });
        appContainer.appendChild(appLayout);

        // Initialize Sidebar
        const sidebarSection = appLayout.querySelector('.sidebar-section');
        if (sidebarSection) {
          const sidebar = Sidebar.create();
          sidebarSection.appendChild(sidebar);
        }

        // Initialize Main Content Area
        const mainSection = appLayout.querySelector('.main-section');
        if (mainSection) {
          // Create main application wrapper with Tailwind
          const appWrapper = document.createElement('div');
          appWrapper.className = 'flex flex-col h-screen bg-white dark:bg-[#0D1116]';

          // Create top navigation/header
          const header = document.createElement('div');
          header.className = 'bg-white dark:bg-[#131920] border-b border-gray-200 dark:border-[#1A2228] px-6 py-3 flex items-center justify-between';
          header.innerHTML = `
            <div class="flex items-center gap-4">
              <h1 class="text-2xl font-bold">
                <span class="text-[#E19200]">⚡</span> DevForge
              </h1>
            </div>
            <div class="flex items-center gap-4">
              <button class="dev-button-secondary" id="theme-toggle">🌙 Dark</button>
              <button class="dev-button-primary" id="settings-btn">⚙️ Settings</button>
            </div>
          `;
          appWrapper.appendChild(header);

          // Create main content area with tabs
          const contentWrapper = document.createElement('div');
          contentWrapper.className = 'flex-1 flex flex-col overflow-hidden';

          // Tab navigation
          const tabs = document.createElement('div');
          tabs.className = 'bg-white dark:bg-[#0D1116] border-b border-gray-200 dark:border-[#1A2228] flex gap-2 px-6 py-3 overflow-x-auto';
          tabs.innerHTML = `
            <button class="tab-btn active px-4 py-2 border-b-2 border-[#239A82] dark:border-[#76CD1D] font-semibold text-[#239A82] dark:text-[#76CD1D]" data-tab="chat">💬 Chat</button>
            <button class="tab-btn px-4 py-2 border-b-2 border-transparent text-gray-600 dark:text-gray-400 font-semibold hover:text-[#0D1116] dark:hover:text-white" data-tab="repo">📦 Repository</button>
            <button class="tab-btn px-4 py-2 border-b-2 border-transparent text-gray-600 dark:text-gray-400 font-semibold hover:text-[#0D1116] dark:hover:text-white" data-tab="config">⚙️ Configuration</button>
            <button class="tab-btn px-4 py-2 border-b-2 border-transparent text-gray-600 dark:text-gray-400 font-semibold hover:text-[#0D1116] dark:hover:text-white" data-tab="debug">🐛 Debug</button>
          `;
          contentWrapper.appendChild(tabs);

          // Tab content areas
          const contentArea = document.createElement('div');
          contentArea.className = 'flex-1 overflow-hidden';

          // Chat Tab Content
          const chatTab = document.createElement('div');
          chatTab.className = 'tab-content h-full flex flex-col gap-4 p-6 overflow-y-auto';
          chatTab.dataset.tab = 'chat';

          const chatWindow = ChatWindow.create();
          chatWindow.className = 'flex-1 overflow-y-auto rounded-lg border border-gray-200 dark:border-[#1A2228]';

          const inputBox = InputBox.create({
            placeholder: 'Ask DevForge anything...',
            disabled: false,
            onSend: async (message) => {
              console.log('Message sent:', message);
              try {
                const response = await fetch('/api/chat', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ message })
                });
                if (response.ok) {
                  const data = await response.json();
                  console.log('Response:', data);
                }
              } catch (error) {
                console.error('Chat error:', error);
              }
            },
          });

          chatTab.appendChild(chatWindow);
          chatTab.appendChild(inputBox);
          contentArea.appendChild(chatTab);

          // Repository Tab Content
          const repoTab = document.createElement('div');
          repoTab.className = 'tab-content h-full flex flex-col gap-4 p-6 overflow-y-auto hidden';
          repoTab.dataset.tab = 'repo';
          repoTab.innerHTML = `
            <div class="bg-white dark:bg-[#131920] border border-gray-200 dark:border-[#1A2228] rounded-lg p-4 shadow-sm">
              <h2 class="text-xl font-bold mb-4">Repository Browser</h2>
              <div id="repo-selector"></div>
            </div>
            <div class="bg-white dark:bg-[#131920] border border-gray-200 dark:border-[#1A2228] rounded-lg p-4 shadow-sm flex-1 overflow-hidden">
              <h3 class="text-lg font-semibold mb-4">Files</h3>
              <div id="repo-tree" class="overflow-y-auto"></div>
            </div>
          `;
          contentArea.appendChild(repoTab);

          // Configuration Tab Content
          const configTab = document.createElement('div');
          configTab.className = 'tab-content h-full flex flex-col gap-4 p-6 overflow-y-auto hidden';
          configTab.dataset.tab = 'config';
          configTab.innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div class="bg-white dark:bg-[#131920] border border-gray-200 dark:border-[#1A2228] rounded-lg p-4 shadow-sm">
                <h3 class="text-lg font-semibold mb-4">AI Model</h3>
                <div id="model-selector"></div>
              </div>
              <div class="bg-white dark:bg-[#131920] border border-gray-200 dark:border-[#1A2228] rounded-lg p-4 shadow-sm">
                <h3 class="text-lg font-semibold mb-4">Provider</h3>
                <div id="provider-selector"></div>
              </div>
            </div>
            <div class="bg-white dark:bg-[#131920] border border-gray-200 dark:border-[#1A2228] rounded-lg p-4 shadow-sm">
              <h3 class="text-lg font-semibold mb-4">API Keys & Settings</h3>
              <div id="settings-form"></div>
            </div>
          `;
          contentArea.appendChild(configTab);

          // Debug Tab Content
          const debugTab = document.createElement('div');
          debugTab.className = 'tab-content h-full flex flex-col gap-4 p-6 overflow-y-auto hidden';
          debugTab.dataset.tab = 'debug';
          debugTab.innerHTML = `
            <div class="bg-white dark:bg-[#131920] border border-gray-200 dark:border-[#1A2228] rounded-lg p-4 shadow-sm">
              <h3 class="text-lg font-semibold mb-4">System Information</h3>
              <div class="space-y-2 font-mono text-sm">
                <p>User Agent: <span id="user-agent" class="text-gray-600 dark:text-gray-400"></span></p>
                <p>App Version: <span class="text-gray-600 dark:text-gray-400">1.0.0</span></p>
                <p>Status: <span class="text-green-600">Connected</span></p>
              </div>
            </div>
            <div class="bg-white dark:bg-[#131920] border border-gray-200 dark:border-[#1A2228] rounded-lg p-4 shadow-sm flex-1">
              <h3 class="text-lg font-semibold mb-4">Console</h3>
              <div id="debug-console" class="bg-black text-green-400 rounded p-3 font-mono text-xs overflow-y-auto h-64"></div>
            </div>
          `;
          contentArea.appendChild(debugTab);

          contentWrapper.appendChild(contentArea);
          appWrapper.appendChild(contentWrapper);
          mainSection.appendChild(appWrapper);

          // Initialize tab switching
          const tabButtons = tabs.querySelectorAll('.tab-btn');
          const tabContents = contentArea.querySelectorAll('.tab-content');

          tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
              const tabName = btn.dataset.tab;

              // Update active button
              tabButtons.forEach(b => {
                b.classList.remove('border-b-[#239A82]', 'dark:border-b-[#76CD1D]', 'text-[#239A82]', 'dark:text-[#76CD1D]');
                b.classList.add('border-b-transparent', 'text-gray-600', 'dark:text-gray-400');
              });
              btn.classList.add('border-b-[#239A82]', 'dark:border-b-[#76CD1D]', 'text-[#239A82]', 'dark:text-[#76CD1D]');
              btn.classList.remove('border-b-transparent', 'text-gray-600', 'dark:text-gray-400');

              // Update visible content
              tabContents.forEach(content => {
                if (content.dataset.tab === tabName) {
                  content.classList.remove('hidden');
                } else {
                  content.classList.add('hidden');
                }
              });

              // Initialize tab-specific components
              initializeTabContent(tabName);
            });
          });

          // Initialize tab content when switching
          function initializeTabContent(tabName) {
            if (tabName === 'repo') {
              const repoSelector = document.getElementById('repo-selector');
              const repoTree = document.getElementById('repo-tree');
              if (repoSelector && !repoSelector.hasChildNodes()) {
                const selector = RepoSelector.create();
                repoSelector.appendChild(selector);
              }
              if (repoTree && !repoTree.hasChildNodes()) {
                const tree = RepoTree.create();
                repoTree.appendChild(tree);
              }
            } else if (tabName === 'config') {
              const modelSelector = document.getElementById('model-selector');
              const providerSelector = document.getElementById('provider-selector');
              const settingsForm = document.getElementById('settings-form');

              if (modelSelector && !modelSelector.hasChildNodes()) {
                const selector = ModelSelector.create();
                modelSelector.appendChild(selector);
              }
              if (providerSelector && !providerSelector.hasChildNodes()) {
                const selector = ProviderSelector.create();
                providerSelector.appendChild(selector);
              }
              if (settingsForm && !settingsForm.hasChildNodes()) {
                const form = SettingsForm.create();
                settingsForm.appendChild(form);
              }
            } else if (tabName === 'debug') {
              document.getElementById('user-agent').textContent = navigator.userAgent.substring(0, 60) + '...';
            }
          }

          // Theme toggle
          const themeBtn = document.getElementById('theme-toggle');
          if (themeBtn) {
            themeBtn.addEventListener('click', () => {
              document.documentElement.classList.toggle('dark');
              themeBtn.textContent = document.documentElement.classList.contains('dark') ? '☀️ Light' : '🌙 Dark';
            });
          }

          // Settings button
          const settingsBtn = document.getElementById('settings-btn');
          if (settingsBtn) {
            settingsBtn.addEventListener('click', () => {
              const configTab = tabs.querySelector('[data-tab="config"]');
              if (configTab) configTab.click();
            });
          }
        }
      }

      // Initialize when page loads
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeApp);
      } else {
        initializeApp();
      }
    </script>
</body>
</html>
