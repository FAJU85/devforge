version: '3.8'

services:
  fastapi-backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: devforge-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://devforge:devforge@postgres:5432/devforge
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=https://devforge.app,https://www.devforge.app
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=20
      - RATELIMIT_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - devforge-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:15-alpine
    container_name: devforge-postgres
    environment:
      - POSTGRES_USER=devforge
      - POSTGRES_PASSWORD=devforge
      - POSTGRES_DB=devforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devforge-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devforge-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devforge-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@devforge.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    networks:
      - devforge-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  devforge-network:
    driver: bridge
