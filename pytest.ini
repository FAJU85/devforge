[pytest]
# Pytest configuration for comprehensive QA suite

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    e2e: end-to-end tests with Playwright
    selenium: Selenium browser automation tests
    unit: unit tests
    integration: integration tests
    slow: slow running tests
    smoke: smoke/sanity tests
    regression: regression tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Allure reporting
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --alluredir=allure-results

# Test paths
testpaths = tests

# Asyncio
asyncio_mode = auto
