name: Autonomous CI/CD

on:
  pull_request:
    branches:
      - "auto/**"

jobs:
  test-and-merge:
    name: Test & Auto-merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@0acd30dc94ef361f02e70e59c09c6d29ec8fe66f # v5.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt sentry-sdk[fastapi]==2.27.0 pytest==8.3.5 pytest-asyncio==0.25.3 httpx==0.28.1 rollbar==1.3.0 posthog==7.17.0

      - name: Run tests
        id: run_tests
        env:
          GITHUB_CLIENT_ID: ""
          GITHUB_CLIENT_SECRET: ""
          HF_TOKEN: ""
          SENTRY_DSN: ""
        run: pytest tests/ -v --tb=short 2>&1 | tee /tmp/test-output.txt; echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Auto-merge PR on success
        if: steps.run_tests.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --squash --auto --delete-branch || true

      - name: Comment on PR with failure summary
        if: steps.run_tests.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(tail -50 /tmp/test-output.txt | head -50)
          gh pr comment --body "## Test Failures

          \`\`\`
          ${SUMMARY}
          \`\`\`

          Auto-merge skipped due to test failures." || true
