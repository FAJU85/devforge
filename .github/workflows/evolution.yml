name: Autonomous Evolution Cycle

on:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours — matches the cadence GitHub actually delivers; */30 only queued throttled runs
  workflow_dispatch:
    inputs:
      flag_name:
        description: "Flag name (leave empty for all canary flags)"
        required: false
        default: ""
      error_rate_canary:
        description: "Canary error rate % (fallback when real metrics unavailable)"
        required: false
        default: "0.1"
      error_rate_baseline:
        description: "Baseline error rate % (fallback)"
        required: false
        default: "0.2"
      latency_canary_ms:
        description: "Canary latency ms (fallback)"
        required: false
        default: "95"
      latency_baseline_ms:
        description: "Baseline latency ms (fallback)"
        required: false
        default: "100"
      sample_size:
        description: "Sample size (fallback)"
        required: false
        default: "100"

jobs:
  evolve:
    name: Run Evolution Cycle
    runs-on: ubuntu-latest
    steps:
      - name: Probe live metrics from PostHog
        id: probe_metrics
        env:
          APP_URL: ${{ secrets.SPACE_URL || 'https://vooom-devforge.hf.space' }}
          FLAG_NAME: ${{ github.event.inputs.flag_name || '' }}
        run: |
          # Try to fetch real canary metrics for the specified flag.
          # The /api/metrics/live endpoint queries PostHog for events captured
          # by the flag routing middleware (request_completed events with
          # flag, bucket, latency_ms, status_code properties).
          if [ -n "$FLAG_NAME" ]; then
            ENCODED_FLAG=$(python3 -c 'import sys,urllib.parse;print(urllib.parse.quote(sys.argv[1]))' "$FLAG_NAME")
            METRICS_URL="$APP_URL/api/metrics/live?flag=${ENCODED_FLAG}&hours=1"
            REAL=$(curl -s --max-time 15 "$METRICS_URL" 2>/dev/null || echo '{}')
            SOURCE=$(echo "$REAL" | jq -r '.source // "unavailable"' 2>/dev/null || echo "unavailable")
            echo "metrics_source=$SOURCE" >> "$GITHUB_OUTPUT"
            if [ "$SOURCE" = "posthog" ]; then
              echo "use_real=true" >> "$GITHUB_OUTPUT"
              echo "Real PostHog metrics available for $FLAG_NAME (source=$SOURCE)"
              echo "$REAL" | jq '.'
            else
              echo "use_real=false" >> "$GITHUB_OUTPUT"
              echo "Real metrics unavailable (source=$SOURCE) — using supplied fallback inputs"
            fi
          else
            # No flag specified — instruct server to use real metrics per flag
            echo "use_real=true" >> "$GITHUB_OUTPUT"
            echo "metrics_source=server_side" >> "$GITHUB_OUTPUT"
            echo "No specific flag: server will attempt PostHog lookup per flag"
          fi

      - name: Run evolution cycle
        env:
          APP_URL: ${{ secrets.SPACE_URL || 'https://vooom-devforge.hf.space' }}
          FLAG_NAME: ${{ github.event.inputs.flag_name || '' }}
          EC: ${{ github.event.inputs.error_rate_canary || '0.1' }}
          EB: ${{ github.event.inputs.error_rate_baseline || '0.2' }}
          LC: ${{ github.event.inputs.latency_canary_ms || '95' }}
          LB: ${{ github.event.inputs.latency_baseline_ms || '100' }}
          SS: ${{ github.event.inputs.sample_size || '100' }}
          USE_REAL: ${{ steps.probe_metrics.outputs.use_real || 'true' }}
        run: |
          # Build the request payload. When USE_REAL=true the server fetches
          # real PostHog/Rollbar metrics and overrides the fallback values.
          USE_REAL_BOOL="$([ "$USE_REAL" = "true" ] && echo "true" || echo "false")"
          BODY=$(jq -n \
            --arg fn "$FLAG_NAME" \
            --argjson ec "$EC" --argjson eb "$EB" \
            --argjson lc "$LC" --argjson lb "$LB" \
            --argjson ss "$SS" \
            --argjson ur "$USE_REAL_BOOL" \
            '{
              metrics: {
                error_rate_canary: $ec,
                error_rate_baseline: $eb,
                latency_canary_ms: $lc,
                latency_baseline_ms: $lb,
                sample_size: $ss
              },
              flag_name: (if $fn == "" then null else $fn end),
              use_real_metrics: $ur,
              metrics_hours: 1
            }')
          echo "Payload: $BODY"
          RESPONSE=$(curl -s -X POST "$APP_URL/api/evolution/run" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            --max-time 60)
          echo "Evolution response: $RESPONSE"
          echo "$RESPONSE" | jq '.results[]? | "\(.flag): \(.action) → \(.rollout_pct // "—")% — \(.reason)"' -r || true
