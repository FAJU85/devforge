name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: devforge_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install sentry-sdk[fastapi]==2.27.0 pytest==8.3.5 pytest-asyncio==0.25.3 httpx==0.28.1 \
                      rollbar==1.3.0 posthog==7.17.0 pytest-cov==6.0.0 bandit==1.8.3 \
                      sqlalchemy==2.0.50 psycopg2-binary==2.9.10 alembic==1.13.2 cryptography==41.0.7 sqlalchemy-utils==0.41.1

      - name: Run database migrations
        env:
          DATABASE_URL: "postgresql://test_user:test_password@localhost:5432/devforge_test"
        run: |
          cd alembic && alembic upgrade head || true
          cd ..

      - name: Security scan
        run: |
          bandit -r autonomous/ main.py -ll -x tests/ --format txt || true

      - name: Run tests with coverage
        env:
          GITHUB_CLIENT_ID: ""
          GITHUB_CLIENT_SECRET: ""
          HF_TOKEN: ""
          SENTRY_DSN: ""
          DATABASE_URL: "postgresql://test_user:test_password@localhost:5432/devforge_test"
        run: |
          pytest tests/ -v --tb=short \
            --cov=autonomous --cov=main \
            --cov-report=term-missing \
            --cov-fail-under=70

  test-control-plane:
    name: Control-plane tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install control-plane dependencies
        run: |
          pip install -r control_plane/requirements.txt || true
          pip install pytest pytest-asyncio

      - name: Run control-plane tests
        env:
          PINECONE_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: pytest control_plane/tests/ -v --tb=short

  test-go:
    name: Go data-plane tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: data_plane/go.sum

      - name: Run Go tests
        working-directory: data_plane
        run: go test ./... -v
